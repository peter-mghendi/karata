name: Publish Karata.Web project

on:
  push:
    branches: [ "main" ]

jobs:
  release:
    permissions:
      contents: write

    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        
      - name: Set version
        id: params
        run: echo "version=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT  

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install Webassembly workload
        run: dotnet workload install wasm-tools

      - name: Restore dependencies
        run: dotnet restore Karata.slnf

      - name: Build
        run: dotnet build --configuration Release --no-restore Karata.slnf

      - name: Run tests
        run: dotnet test --configuration Release --no-build --verbosity normal Karata.slnf
        
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  

      - name: Publish
        run: dotnet publish --configuration Release -o dist src/Karata.Web/Karata.Web.csproj
      
      - name: Deploy to releases-karata-web
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: releases-karata-web
          commit-message: "Release ${{ steps.params.outputs.version }}"
          folder: dist/wwwroot
          force: true
          single-commit: true
        
      - name: Create archive
        run: tar -czf karata-web.tar.gz dist/wwwroot
        
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          make_latest: true
          tag_name: ${{ steps.params.outputs.version }}
          generate_release_notes: true
          files: karata-web.tar.gz